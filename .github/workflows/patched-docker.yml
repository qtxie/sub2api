name: Build patched Docker image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra Docker tag to publish"
        required: false
        default: "patched"
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set image metadata
        id: image
        shell: bash
        run: |
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          REPO="$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
          EXTRA_TAG="${{ github.event.inputs.tag || 'patched' }}"
          echo "name=ghcr.io/${OWNER}/${REPO}" >> "$GITHUB_OUTPUT"
          echo "extra_tag=${EXTRA_TAG}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.extra_tag }}
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.short_sha }}
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          build-args: |
            VERSION=patched-${{ steps.image.outputs.short_sha }}
            COMMIT=${{ github.sha }}
